---
- name: Install Docker SDK for Python
  pip:
    name: docker

- name: Pull backend image
  community.docker.docker_image:
    name: hubrudcontainerregistry.azurecr.io/backend:latest
    source: pull

- name: Install SQL client tools
  apt:
    name: mssql-tools
    state: present
    update_cache: yes

- name: Install unixODBC
  apt:
    name: unixodbc-dev
    state: present

- name: Copy database initialization script
  copy:
    src: ../../../database/init.sql
    dest: /tmp/init.sql

- name: Initialize Azure SQL Database
  shell: |
    /opt/mssql-tools/bin/sqlcmd \
    -S {{ sql_server }}.database.windows.net \
    -U {{ sql_username }} \
    -P "{{ sql_password }}" \
    -d {{ sql_database }} \
    -i /tmp/init.sql

- name: Run backend container
  community.docker.docker_container:
    name: backend
    image: hubrudcontainerregistry.azurecr.io/backend:latest
    state: started
    restart_policy: always
    recreate: true
    pull: true
    ports:
      - "5000:5000"
    env:
      DB_HOST: "{{ sql_server }}.database.windows.net"
      DB_NAME: "{{ sql_database }}"
      DB_USER: "{{ sql_username }}"
      DB_PASSWORD: "{{ sql_password }}"